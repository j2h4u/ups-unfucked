# Drop-in for nut-driver@cyberpower-virtual.service
# Ensures dummy-ups starts AFTER ups-battery-monitor writes the .dev file.
# Install to: /etc/systemd/system/nut-driver@cyberpower-virtual.service.d/
[Unit]
After=ups-battery-monitor.service
Requires=ups-battery-monitor.service

[Service]
# Wait for .dev file (daemon needs ~30s for EMA stabilization before first write)
ExecStartPre=/bin/bash -c 'for i in $(seq 1 60); do [ -f /run/ups-battery-monitor/ups-virtual.dev ] && exit 0; sleep 1; done; echo "Timeout waiting for ups-virtual.dev" >&2; exit 1'
