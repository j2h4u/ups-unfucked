# UPS Battery Monitor configuration
# Location: ~/.config/ups-battery-monitor/config.toml (or next to the repo)
# Only settings you'd realistically change are exposed here.

# UPS device name in NUT (as configured in ups.conf)
ups_name = "cyberpower"

# Initiate shutdown when estimated runtime drops below this (minutes)
shutdown_minutes = 5

# Alert when battery health (SoH) drops below this (0.0-1.0)
soh_alert = 0.80

# Battery rated capacity in Ah. Default 7.2 matches the stock battery
# in most 425-850W UPS units (CSB HR1234W, GP1272, etc.).
# Change this if you swap in a higher-capacity battery of the same
# form factor — e.g. 9.0 for a 9Ah cell.
# capacity_ah = 7.2

[scheduling]
# Phase 17: Daemon-controlled test scheduling parameters

# Grid stability cooldown (hours)
# Default: 4.0 (skip test if blackout in last 4h)
# Set to 0.0 to disable this gate entirely (test despite recent blackouts)
# USER FEEDBACK: Set to 0 for grids with frequent short blackouts (1.5–3 min)
grid_stability_cooldown_hours = 4.0

# SoH floor threshold (percentage)
# Default: 60% (don't test if SoH below 60%)
# Hard block: no test allowed below this level
# Range: [0.0, 1.0]
soh_floor_threshold = 0.60

# Minimum days between deep tests (rate limiting)
# Default: 7.0 (at most 1 deep test per week)
# Hard limit: enforced even if sulfation is high
# Range: [1.0, ∞]
min_days_between_tests = 7.0

# ROI threshold for test recommendation
# Default: 0.2 (marginal benefit >20% of total cost)
# If ROI < threshold and cycle_budget > 20, defer test
# Range: [0.0, 1.0]
roi_threshold = 0.2

# Blackout credit window (days)
# Default: 7.0 (natural ≥90% DoD discharge grants 7-day test skip)
# Range: [1.0, 30.0]
blackout_credit_window_days = 7.0

# Minimum cycle budget before critical block
# Default: 5 (block test if cycle_budget < 5)
# Range: [1, ∞]
critical_cycle_budget_threshold = 5

# Deep discharge threshold for test type selection
# Default: 0.65 (sulfation >0.65 → propose deep; 0.40–0.65 → quick)
# Range: [0.0, 1.0]
deep_test_sulfation_threshold = 0.65

# Quick discharge threshold for test type selection
# Default: 0.40 (sulfation >0.40 → propose at least quick test)
# Range: [0.0, 1.0]
quick_test_sulfation_threshold = 0.40

# Scheduling evaluation time (UTC hour)
# Default: 8 (evaluate at 08:00 UTC daily)
# Range: [0, 23]
scheduler_eval_hour_utc = 8

# Enable verbose scheduling logging
# Default: false (only log decisions, not internal evaluations)
# Set to true for detailed audit trail debugging
verbose_scheduling = false
