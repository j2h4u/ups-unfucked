# Configuration block to add to /etc/nut/ups.conf
# This registers the virtual UPS that reads corrected metrics from /run/ups-battery-monitor/ups-virtual.dev
# Added by ups-battery-monitor Phase 3

[cyberpower-virtual]
driver = dummy-ups
port = /run/ups-battery-monitor/ups-virtual.dev
mode = dummy-once
desc = "Virtual UPS proxy with corrected battery metrics from calculated model"
